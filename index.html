<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>AI 智能 PDF 阅读器 (终极防卡版)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://fastly.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; line-height: 1.5; max-width: 800px; margin: 0 auto; background-color: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1 { text-align: center; color: #1a73e8; margin: 0 0 10px 0; font-size: 24px; }
        #status { padding: 10px; background: #e8f0fe; color: #1967d2; font-size: 14px; margin-bottom: 10px; border-radius: 5px; font-weight: bold; border-left: 5px solid #1a73e8; }
        #file-upload { margin: 10px 0; width: 100%; font-size: 15px; }
        #timer-display { color: #d93025; font-weight: bold; text-align: center; font-size: 14px; }
        #chapter-select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #1a73e8; font-size: 15px; background: #fff; cursor: pointer; }
        #text-area { width: 100%; height: 400px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; line-height: 1.8; }
        .btn-group { display: flex; gap: 8px; margin: 10px 0; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-size: 15px; font-weight: bold; transition: 0.2s; }
        .btn-play { background-color: #34a853; }
        .btn-pause { background-color: #fbbc05; }
        .btn-stop { background-color: #ea4335; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        #progress-fill { height: 100%; background: #1a73e8; width: 0%; transition: 0.3s; }
        .smart-tip { font-size: 13px; color: #e67e22; background: #fdf2e9; padding: 8px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📚 AI 智能有声书阅读器</h1>
        <div id="status">正在检查系统环境...</div>
        <input type="file" id="file-upload" accept="application/pdf">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="timer-display"></div>
    </div>

    <div class="card">
        <label>📖 章节目录 (提取后在此切换)：</label>
        <select id="chapter-select"><option value="">-- 请等待文件解析 --</option></select>
        
        <div class="smart-tip">💡 <b>高级控制：</b>默认朗读全章；用鼠标选中文字可只读该句；在文中点击一下可从光标处开始读。</div>
        
        <div class="btn-group">
            <button id="toggle-btn" class="btn-play" onclick="togglePlayPause()">▶ 播放</button>
            <button class="btn-stop" onclick="stopReading()">⏹ 停止并重置</button>
        </div>
        <textarea id="text-area" placeholder="正文内容将在此显示..."></textarea>
    </div>

    <script>
        let synth = window.speechSynthesis;
        let utterance = null;
        let chapters = [];
        let autoReadTimer = null;
        let hasInteracted = false;
        
        // 分段朗读专用变量
        let textChunks = []; 
        let currentChunkIndex = 0;
        
        const baseChapterRegex = /(第\s*[一二三四五六七八九十百0-9]+\s*[章节回篇].*|Chapter\s*\d+.*)/i;

        window.onload = function() {
            if (typeof pdfjsLib === 'undefined') {
                document.getElementById('status').innerHTML = "❌ <b>网络错误：</b>核心组件加载失败，请按 Ctrl+F5 强制刷新！";
            } else {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://fastly.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js';
                document.getElementById('status').innerText = "✅ 准备就绪，请选择 PDF 文件上传";
            }
        };

        // 文件解析逻辑 (保持不变)
        document.getElementById('file-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            resetEverything();
            document.getElementById('status').innerText = "⏳ 阶段一：正在光速扫描前置目录树...";
            
            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    
                    let tocTitles = [];
                    const scanLimit = Math.min(15, pdf.numPages);
                    for (let i = 1; i <= scanLimit; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(" ");
                        const lines = pageText.split(/[\n\r]+/);
                        for(let line of lines) {
                            if(baseChapterRegex.test(line)) {
                                let cleanTitle = line.replace(/(?:\.{3,}|\s+\d+$)/g, '').trim();
                                if(cleanTitle.length < 30 && !tocTitles.includes(cleanTitle)) {
                                    tocTitles.push(cleanTitle);
                                }
                            }
                        }
                    }

                    if(tocTitles.length > 0) {
                        document.getElementById('status').innerText = `✅ 成功捕获 ${tocTitles.length} 条真实目录。正在全文锚定...`;
                    } else {
                        document.getElementById('status').innerText = `⚠️ 未发现标准目录，进行全书启发式扫描...`;
                    }

                    let currentChapterText = "";
                    let lastChapterTitle = tocTitles.length > 0 ? "前言/导语" : "未命名章节";
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        document.getElementById('progress-fill').style.width = (i/pdf.numPages*100) + "%";
                        
                        let pageText = await extractSmartText(page, i);
                        const lines = pageText.split('\n');
                        
                        for (let line of lines) {
                            const trimmedLine = line.trim();
                            if (trimmedLine.length < 30 && trimmedLine.length > 2) {
                                let isNewChapter = false;
                                if (tocTitles.length > 0) {
                                    const matchedTitle = tocTitles.find(t => trimmedLine.includes(t) || t.includes(trimmedLine));
                                    if (matchedTitle) {
                                        isNewChapter = true;
                                        lastChapterTitle = matchedTitle;
                                    }
                                } else if (baseChapterRegex.test(trimmedLine)) {
                                    isNewChapter = true;
                                    lastChapterTitle = trimmedLine;
                                }

                                if (isNewChapter) {
                                    saveChapter(lastChapterTitle, currentChapterText);
                                    currentChapterText = "";
                                }
                            }
                            currentChapterText += line + "\n";
                        }
                        if (chapters.length === 0) document.getElementById('text-area').value = currentChapterText;
                    }
                    saveChapter(lastChapterTitle, currentChapterText);
                    document.getElementById('status').innerText = `🎉 解析完成，共划分 ${chapters.length} 个章节。`;
                    startCountdown();
                } catch (err) {
                    console.error(err);
                    document.getElementById('status').innerHTML = "❌ <b>解析崩溃：</b>文件可能已损坏或受 DRM 密码保护。";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        async function extractSmartText(page, index) {
            const textContent = await page.getTextContent();
            let lastY, text = "";
            for (let item of textContent.items) {
                if (lastY !== undefined && Math.abs(item.transform[5] - lastY) > 6) {
                    text += "\n";
                }
                text += item.str;
                lastY = item.transform[5];
            }

            if (text.trim().length < 20) {
                document.getElementById('status').innerText = `🔍 第 ${index} 页文字稀少，启动 AI 识别...`;
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                const result = await Tesseract.recognize(canvas, 'chi_sim+eng');
                text = result.data.text;
            }
            return text;
        }

        function saveChapter(title, text) {
            if (text.trim().length < 10) return;
            if(chapters.length > 0 && chapters[chapters.length-1].title === title) {
                chapters[chapters.length-1].text += "\n" + text;
                return;
            }
            chapters.push({ title, text });
            const select = document.getElementById('chapter-select');
            if(chapters.length === 1) select.innerHTML = "";
            const option = document.createElement('option');
            option.value = chapters.length - 1; option.text = title;
            select.add(option);
        }

        document.getElementById('chapter-select').addEventListener('change', function(e) {
            userInteracted();
            const index = e.target.value;
            if (index !== "") {
                document.getElementById('text-area').value = chapters[index].text;
                document.getElementById('text-area').scrollTop = 0;
                stopReading();
                setTimeout(() => { startReading(); }, 300);
            }
        });

        function userInteracted() {
            hasInteracted = true;
            clearInterval(autoReadTimer);
            document.getElementById('timer-display').innerText = "";
        }

        function startCountdown() {
            let seconds = 60;
            autoReadTimer = setInterval(() => {
                if (hasInteracted) return userInteracted();
                seconds--;
                document.getElementById('timer-display').innerText = `⏳ ${seconds} 秒后自动播放前三章... (点击页面取消)`;
                if (seconds <= 0) {
                    clearInterval(autoReadTimer);
                    autoReadFirstThree();
                }
            }, 1000);
        }

        function autoReadFirstThree() {
            if (hasInteracted) return;
            document.getElementById('timer-display').innerText = "🚀 自动播放已启动";
            let combined = "";
            for (let i = 0; i < Math.min(3, chapters.length); i++) {
                combined += `\n【${chapters[i].title}】\n` + chapters[i].text + "\n\n";
            }
            if (combined !== "") {
                document.getElementById('text-area').value = combined;
                document.getElementById('text-area').scrollTop = 0;
            }
            startReading();
        }

        const toggleBtn = document.getElementById('toggle-btn');
        function setButtonPlayState() { toggleBtn.innerText = "▶ 播放"; toggleBtn.className = "btn-play"; }
        function setButtonPauseState() { toggleBtn.innerText = "⏸ 暂停"; toggleBtn.className = "btn-pause"; }

        function togglePlayPause() {
            userInteracted();
            if (synth.speaking && !synth.paused) {
                synth.pause();
                setButtonPlayState();
                document.getElementById('status').innerText = "⏸ 已暂停播放";
            } else if (synth.paused) {
                synth.resume();
                setButtonPauseState();
                document.getElementById('status').innerText = "📖 恢复播放...";
            } else {
                startReading();
            }
        }

        // ==========================================
        // 纳米级粉碎喂食机制 (彻底解决 15 秒 Bug)
        // ==========================================
        function startReading() {
            synth.cancel(); // 掐断旧声音
            textChunks = []; // 清空旧数据
            currentChunkIndex = 0;

            const textArea = document.getElementById('text-area');
            const fullText = textArea.value;
            if (!fullText) return;

            const startPos = textArea.selectionStart;
            const endPos = textArea.selectionEnd;
            
            let rawText = fullText;
            if (startPos !== endPos) {
                rawText = fullText.substring(startPos, endPos);
            } else if (startPos > 0) {
                rawText = fullText.substring(startPos);
            }
            
            // 核心粉碎逻辑：在所有的标点符号处，强行劈开！
            let rawChunks = rawText.replace(/([。！？；，、,.!?;:\n])/g, "$1|").split('|');
            
            for (let c of rawChunks) {
                c = c.trim();
                if (!c) continue;
                
                // 二次保险：如果连逗号都没有，而且这句废话超过了 50 个字，强行按 50 个字用刀切断！
                while (c.length > 50) {
                    textChunks.push(c.substring(0, 50));
                    c = c.substring(50);
                }
                if (c.length > 0) textChunks.push(c);
            }
            
            if(textChunks.length === 0) return;

            document.getElementById('status').innerText = "📖 正在安全分段朗读中...";
            playNextChunk(); 
        }

        function playNextChunk() {
            // 如果已经被用户手动停止，就别读了
            if (textChunks.length === 0) return; 

            if (currentChunkIndex >= textChunks.length) {
                document.getElementById('status').innerText = "✅ 朗读结束。";
                setButtonPlayState();
                return;
            }

            let chunk = textChunks[currentChunkIndex];
            utterance = new SpeechSynthesisUtterance(chunk);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.1;

            utterance.onstart = () => { setButtonPauseState(); };
            
            utterance.onend = () => { 
                currentChunkIndex++;
                playNextChunk(); 
            };
            
            utterance.onerror = (e) => { 
                console.warn("语音片段跳过", e);
                currentChunkIndex++;
                playNextChunk(); // 就算这一小块出错，也不准停，继续读下一块！
            };

            synth.speak(utterance);
        }

        function stopReading() { 
            userInteracted();
            textChunks = []; // 只要清空数组，递归朗读就会瞬间死亡停止
            synth.cancel(); 
            setButtonPlayState(); 
            document.getElementById('status').innerText = "⏹ 播放已停止"; 
        }

        function resetEverything() {
            clearInterval(autoReadTimer);
            hasInteracted = false;
            chapters = [];
            stopReading();
            document.getElementById('chapter-select').innerHTML = '<option value="">-- 请等待文件解析 --</option>';
            document.getElementById('text-area').value = "";
            document.getElementById('progress-fill').style.width = "0%";
            document.getElementById('timer-display').innerText = "";
        }
        
        document.body.addEventListener('click', function() {
            if(!hasInteracted && chapters.length > 0) userInteracted();
        });
    </script>
</body>
</html>
