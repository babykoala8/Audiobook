<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>AI 智能 PDF 阅读器 (精准版)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://fastly.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; line-height: 1.5; max-width: 800px; margin: 0 auto; background-color: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1 { text-align: center; color: #1a73e8; margin: 0 0 10px 0; }
        #status { padding: 10px; background: #e8f0fe; color: #1967d2; font-size: 13px; margin-bottom: 10px; border-radius: 5px; font-weight: bold; border-left: 5px solid #1a73e8; }
        #file-upload { margin: 10px 0; width: 100%; }
        #chapter-select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #1a73e8; font-size: 16px; background: #fff; cursor: pointer; }
        #text-area { width: 100%; height: 400px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; line-height: 1.8; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-size: 16px; font-weight: bold; transition: 0.2s; }
        .btn-play { background-color: #34a853; }
        .btn-play:hover { background-color: #2d9249; }
        .btn-stop { background-color: #ea4335; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        #progress-fill { height: 100%; background: #1a73e8; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📚 智能 PDF 阅读器</h1>
        <div id="status">正在初始化...</div>
        <input type="file" id="file-upload" accept="application/pdf">
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div class="card">
        <label>📖 章节切换 (点击自动播放)：</label>
        <select id="chapter-select"><option value="">-- 请选择章节 --</option></select>
        <div class="btn-group">
            <button class="btn-play" onclick="startReading()">▶ 播放/继续</button>
            <button class="btn-stop" onclick="stopReading()">⏹ 停止</button>
        </div>
        <textarea id="text-area" placeholder="提取的文字会显示在这里，点击文字可指定起始位置..."></textarea>
    </div>

    <script>
        let synth = window.speechSynthesis;
        let utterance = null;
        let chapters = [];
        const chapterRegex = /^(第\s*[一二三四五六七八九十百0-9]+\s*[章节回].*|Chapter\s*\d+.*)$/i;

        window.onload = function() {
            if (typeof pdfjsLib === 'undefined') {
                document.getElementById('status').innerText = "❌ 网络加载失败，请刷新页面！";
            } else {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://fastly.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.worker.min.js';
                document.getElementById('status').innerText = "✅ 准备就绪，请上传 PDF";
            }
        };

        document.getElementById('file-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            resetEverything();
            document.getElementById('status').innerText = "⏳ 正在深度解析文档结构...";
            
            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let currentChapterText = "";
                    let lastChapterTitle = "前言/全文";
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        document.getElementById('progress-fill').style.width = (i/pdf.numPages*100) + "%";
                        
                        let pageText = await extractSmartText(page, i);
                        const lines = pageText.split('\n');
                        
                        for (let line of lines) {
                            const trimmedLine = line.trim();
                            // 只有当这一行很短（小于30字）且符合章节格式时，才判定为新章节
                            if (trimmedLine.length < 30 && chapterRegex.test(trimmedLine)) {
                                saveChapter(lastChapterTitle, currentChapterText);
                                lastChapterTitle = trimmedLine;
                                currentChapterText = "";
                            }
                            currentChapterText += line + "\n";
                        }
                        // 实时更新显示
                        if (chapters.length === 0) document.getElementById('text-area').value = currentChapterText;
                    }
                    saveChapter(lastChapterTitle, currentChapterText);
                    document.getElementById('status').innerText = `✅ 识别完毕，共找到 ${chapters.length} 个部分。`;
                } catch (err) {
                    document.getElementById('status').innerText = "❌ 解析失败，文件可能有加密。";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // 核心优化：智能提取段落文字
        async function extractSmartText(page, index) {
            const textContent = await page.getTextContent();
            let lastY, text = "";
            
            // 按照坐标拼接文字，保留换行
            for (let item of textContent.items) {
                // 如果垂直坐标变化超过5个单位，判定为换行
                if (lastY !== undefined && Math.abs(item.transform[5] - lastY) > 5) {
                    text += "\n";
                }
                text += item.str;
                lastY = item.transform[5];
            }

            // 如果文字实在太少，启动 OCR
            if (text.trim().length < 20) {
                document.getElementById('status').innerText = `🔍 第 ${index} 页正在进行 AI 识别...`;
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                const result = await Tesseract.recognize(canvas, 'chi_sim+eng');
                text = result.data.text;
            }
            return text;
        }

        function saveChapter(title, text) {
            if (text.trim().length < 2) return;
            chapters.push({ title, text });
            const select = document.getElementById('chapter-select');
            const option = document.createElement('option');
            option.value = chapters.length - 1;
            option.text = title;
            select.add(option);
        }

        // 核心优化：选完章节自动开始读
        document.getElementById('chapter-select').addEventListener('change', function(e) {
            const index = e.target.value;
            if (index !== "") {
                document.getElementById('text-area').value = chapters[index].text;
                // 重置滚动条到顶端
                document.getElementById('text-area').scrollTop = 0;
                // 自动开始播放
                setTimeout(() => { startReading(); }, 200);
            }
        });

        function startReading() {
            if (synth.paused) { synth.resume(); return; }
            synth.cancel();

            const textArea = document.getElementById('text-area');
            const fullText = textArea.value;
            if (!fullText) return;

            const startPos = textArea.selectionStart;
            const endPos = textArea.selectionEnd;
            
            // 如果有划选则读划选，如果有光标则从光标读，否则读全文
            let textToRead = (startPos !== endPos) ? fullText.substring(startPos, endPos) : fullText.substring(startPos);
            
            utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.1;
            
            utterance.onstart = () => { document.getElementById('status').innerText = "📖 正在播放中..."; };
            utterance.onend = () => { document.getElementById('status').innerText = "✅ 播放结束。"; };
            
            synth.speak(utterance);
        }

        function stopReading() { synth.cancel(); document.getElementById('status').innerText = "⏹ 已停止"; }

        function resetEverything() {
            synth.cancel();
            chapters = [];
            document.getElementById('chapter-select').innerHTML = '<option value="">-- 请选择章节 --</option>';
            document.getElementById('text-area').value = "";
            document.getElementById('progress-fill').style.width = "0%";
        }
    </script>
</body>
</html>
