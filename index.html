<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>我的PDF有声书阅读器-强化版</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: 0 auto; background-color: #f4f7f6; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #text-area { width: 100%; height: 300px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; margin-top: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 4px; margin-right: 10px; margin-bottom: 5px;}
        button:hover { background-color: #2980b9; }
        #status { color: #e67e22; font-weight: bold; margin-top: 10px; padding: 5px; background: #fff3e0; border-radius: 4px; }
        .tips { font-size: 12px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>📚 我的 PDF 有声书 (强化版)</h1>
    
    <div class="controls">
        <p><strong>第一步：上传 PDF</strong></p>
        <input type="file" id="file-upload" accept="application/pdf">
        <div id="status">等待上传...</div>
        <div class="tips">注意：如果是图片组成的扫描件（如手机拍的书），将无法提取文字。</div>
    </div>

    <div class="controls">
        <p><strong>第二步：控制朗读</strong></p>
        <button onclick="startReading()">▶ 开始/继续</button>
        <button onclick="pauseReading()">⏸ 暂停</button>
        <button onclick="stopReading()">⏹ 停止并清空缓存</button>
    </div>

    <p>提取出的文字内容：</p>
    <textarea id="text-area" placeholder="提取的文字会显示在这里..."></textarea>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let synth = window.speechSynthesis;
        let utterance = null;

        // 1. 文件上传与文字提取
        document.getElementById('file-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 立即停止之前的朗读，清空旧文字
            stopReading();
            document.getElementById('text-area').value = "";
            document.getElementById('status').innerText = "⏳ 正在读取文件...";

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";

                    document.getElementById('status').innerText = `⏳ 发现 ${pdf.numPages} 页，正在逐页提取文字...`;

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        
                        // 提取本页文字
                        const pageText = textContent.items.map(item => item.str).join(" ");
                        fullText += pageText + "\n";
                        
                        // 每处理5页更新一次进度，防止大文件卡死
                        if (i % 5 === 0) {
                            document.getElementById('status').innerText = `⏳ 已完成 ${i} / ${pdf.numPages} 页...`;
                        }
                    }

                    if (fullText.trim().length < 5) {
                        document.getElementById('status').innerText = "❌ 警告：无法提取文字！这可能是图片扫描件。";
                        document.getElementById('text-area').value = "这似乎是一个扫描版PDF（图片格式），无法直接读取文字。请换一个电子版PDF试试。";
                    } else {
                        document.getElementById('text-area').value = fullText;
                        document.getElementById('status').innerText = "✅ 文字提取成功！点“开始”听书。";
                    }
                } catch (err) {
                    console.error(err);
                    document.getElementById('status').innerText = "❌ 读取失败，请确保文件是正常的 PDF。";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. 朗读逻辑
        function startReading() {
            // 如果正在暂停中，直接恢复
            if (synth.paused) {
                synth.resume();
                return;
            }

            // 如果正在读（没暂停），就不重复触发
            if (synth.speaking) return;

            const text = document.getElementById('text-area').value;
            if (!text || text.length < 5) {
                alert("没有可读的文字内容！");
                return;
            }

            // 重新获取文字，防止读到“旧的内容”
            utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            
            utterance.onstart = () => {
                document.getElementById('status').innerText = "📖 正在朗读中...";
            };
            
            utterance.onend = () => {
                document.getElementById('status').innerText = "✅ 朗读结束。";
            };

            // 真正开始说话
            synth.speak(utterance);
        }

        function pauseReading() {
            if (synth.speaking && !synth.paused) {
                synth.pause();
                document.getElementById('status').innerText = "⏸ 已暂停";
            }
        }

        function stopReading() {
            // 彻底切断所有语音队列
            synth.cancel(); 
            document.getElementById('status').innerText = "⏹ 已停止并重置";
        }
    </script>
</body>
</html>
